<head>
<meta charset="UTF-8">

<title>Gurumoorthi K — Mechanical Design Portfolio</title>

<meta name="keywords" content="Mechanical Engineer, CAD Designer, SolidWorks, Creo, AutoCAD, Trichy, Tamil Nadu, Fresher, Portfolio">

<style>
  :root{
    --bg:#0b0d10;--bg-raised:#14171c;--line:#262b33;
    --text:#e7e9ec;--text-dim:#8a93a3;--amber:#ff9a4d;--cyan:#5fd3d3;
    --mono:'JetBrains Mono','SF Mono',Menlo,Consolas,monospace;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--amber);color:#0b0d10;}
  .wrap{max-width:880px;margin:0 auto;padding:0 24px;}

  header{position:sticky;top:0;z-index:50;background:rgba(11,13,16,0.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0;}
  .logo{font-family:var(--mono);font-size:15px;font-weight:600;}
  .logo span{color:var(--amber);}
  .nav-links{display:flex;gap:24px;font-family:var(--mono);font-size:13px;color:var(--text-dim);}
  .nav-links a:hover{color:var(--amber);}

  /* hero */
  .hero{padding:80px 0 60px;border-bottom:1px solid var(--line);}
  .home-hero{display:flex;align-items:center;gap:40px;flex-wrap:wrap;margin-bottom:32px;}
  .profile-photo{width:150px;height:150px;border-radius:50%;object-fit:cover;object-position:top center;border:3px solid var(--amber);flex-shrink:0;}
  .hero-text{flex:1;min-width:240px;}
  .hero-name{font-size:clamp(28px,5vw,48px);font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;}
  .hero-role{font-family:var(--mono);font-size:14px;color:var(--cyan);margin-bottom:12px;}
  .hero-bio{font-size:16px;color:var(--text-dim);max-width:540px;margin-bottom:20px;}
  .hero-bio code{font-family:var(--mono);background:var(--bg-raised);padding:2px 6px;border-radius:4px;color:var(--cyan);font-size:14px;}
  .hero-btns{display:flex;gap:12px;flex-wrap:wrap;}
  .btn{font-family:var(--mono);font-size:13px;padding:10px 20px;border-radius:8px;border:1px solid var(--line);transition:all .2s;cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
  .btn-primary{background:var(--amber);color:#0b0d10;border-color:var(--amber);font-weight:600;}
  .btn-primary:hover{background:#ffb347;border-color:#ffb347;}
  .btn-outline{color:var(--text-dim);}
  .btn-outline:hover{border-color:var(--amber);color:var(--amber);}
  .social-row{display:flex;gap:16px;margin-top:20px;}
  .social-link{font-family:var(--mono);font-size:13px;color:var(--text-dim);display:flex;align-items:center;gap:6px;border-bottom:1px solid transparent;}
  .social-link:hover{color:var(--cyan);border-color:var(--cyan);}
  .stack-row{display:flex;flex-wrap:wrap;gap:10px;}
  .pill{font-family:var(--mono);font-size:12px;color:var(--text-dim);border:1px solid var(--line);padding:6px 12px;border-radius:20px;}

  /* sections */
  .section{padding:60px 0;border-bottom:1px solid var(--line);}
  .section-label{font-family:var(--mono);font-size:13px;color:var(--amber);margin-bottom:8px;}
  .section-title{font-size:26px;font-weight:700;margin-bottom:32px;letter-spacing:-0.01em;}

  /* projects */
  .projects-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
  .project{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--bg-raised);transition:border-color .2s,transform .2s;}
  .project:hover{border-color:var(--amber);transform:translateY(-2px);}
  .project-img{width:100%;height:180px;object-fit:cover;display:block;background:#1a1d22;}
  .project-img-placeholder{width:100%;height:180px;background:var(--bg-raised);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;color:var(--text-dim);}
  .project-body{padding:18px 20px;}
  .project-title{font-size:16px;font-weight:600;margin-bottom:6px;}
  .project-meta{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-bottom:8px;}
  .project-desc{color:var(--text-dim);font-size:13px;margin-bottom:12px;}
  .project-tags{display:flex;gap:6px;flex-wrap:wrap;}
  .tag{font-family:var(--mono);font-size:11px;color:var(--cyan);background:rgba(95,211,211,0.08);padding:3px 8px;border-radius:4px;}

  /* certs */
  .certs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  .cert-card{border:1px solid var(--line);border-radius:10px;padding:20px;background:var(--bg-raised);}
  .cert-icon{font-size:24px;margin-bottom:10px;}
  .cert-title{font-weight:600;font-size:15px;margin-bottom:4px;}
  .cert-issuer{font-family:var(--mono);font-size:11px;color:var(--cyan);}
  .cert-date{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:4px;}

  /* skills */
  .skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:28px;}
  .skill-group h4{font-family:var(--mono);font-size:13px;color:var(--cyan);margin-bottom:12px;}
  .skill-group ul{list-style:none;}
  .skill-group li{color:var(--text-dim);font-size:14px;margin-bottom:8px;padding-left:16px;position:relative;}
  .skill-group li::before{content:"›";position:absolute;left:0;color:var(--amber);}

  /* education timeline */
  .timeline{border-left:1px solid var(--line);padding-left:24px;}
  .role{margin-bottom:24px;position:relative;}
  .role::before{content:"";position:absolute;left:-29px;top:6px;width:9px;height:9px;border-radius:50%;background:var(--amber);}
  .role-head{display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;}
  .role-title{font-weight:600;font-size:15px;}
  .role-date{font-family:var(--mono);font-size:12px;color:var(--text-dim);}
  .role-desc{color:var(--text-dim);font-size:14px;margin-top:4px;}

  /* contact */
  .contact-section{padding:72px 0;text-align:center;border-bottom:none;}
  .contact-title{font-size:28px;font-weight:700;margin-bottom:12px;}
  .contact-sub{color:var(--text-dim);margin-bottom:32px;}
  .contact-form{max-width:480px;margin:0 auto 32px;text-align:left;}
  .form-group{margin-bottom:16px;}
  .form-group label{font-family:var(--mono);font-size:12px;color:var(--text-dim);display:block;margin-bottom:6px;}
  .form-group input,.form-group textarea{width:100%;background:var(--bg-raised);border:1px solid var(--line);border-radius:8px;padding:12px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .2s;}
  .form-group input:focus,.form-group textarea:focus{border-color:var(--amber);}
  .form-group textarea{height:120px;resize:vertical;}
  .contact-links{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:24px;}
  .contact-link{font-family:var(--mono);font-size:13px;border:1px solid var(--line);padding:10px 18px;border-radius:8px;transition:all .2s;display:flex;align-items:center;gap:8px;}
  .contact-link:hover{border-color:var(--amber);color:var(--amber);}

  footer{text-align:center;padding:24px 0;font-family:var(--mono);font-size:12px;color:var(--text-dim);}

  @media(max-width:600px){
    .nav-links{display:none;}
    .projects-grid{grid-template-columns:1fr;}
    .certs-grid{grid-template-columns:1fr;}
    .skills-grid{grid-template-columns:1fr;}
    .hero{padding:56px 0 40px;}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none !important;}}
</style>
</head>
